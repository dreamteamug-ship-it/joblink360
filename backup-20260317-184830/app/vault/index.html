<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ TITANIUM VAULT | CTO ACCESS ONLY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            background: #0A0A0F;
            background-image: 
                radial-gradient(circle at 30% 50%, rgba(128,0,0,0.2) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(201,168,76,0.2) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
        }

        .vault-container {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            border: 3px solid #C9A84C;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(201,168,76,0.3);
            position: relative;
            overflow: hidden;
        }

        .vault-container::before {
            content: '⚡';
            position: absolute;
            top: -50px;
            right: -50px;
            font-size: 200px;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .vault-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .vault-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 48px;
            font-weight: 800;
            color: #C9A84C;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(201,168,76,0.5);
        }

        .vault-header .subtitle {
            font-size: 18px;
            color: #F5F5DC;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .security-badge {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(128,0,0,0.2);
            border-radius: 10px;
        }

        .badge-item {
            text-align: center;
        }

        .badge-icon {
            font-size: 24px;
            color: #C9A84C;
        }

        .badge-text {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #C9A84C;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            color: #F5F5DC;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #C9A84C;
            box-shadow: 0 0 20px rgba(201,168,76,0.3);
        }

        .otp-group {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .otp-group input {
            width: 100%;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(201,168,76,0.3);
            border-radius: 10px;
            color: #C9A84C;
        }

        .btn-vault {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #800000, #4A0404);
            border: 2px solid #C9A84C;
            color: #C9A84C;
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-vault:hover {
            background: linear-gradient(135deg, #C9A84C, #8B6910);
            color: #0A0A0F;
            box-shadow: 0 0 30px rgba(201,168,76,0.5);
        }

        .vault-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
        }

        .alert {
            padding: 15px;
            background: rgba(255,0,0,0.1);
            border: 1px solid #FF0000;
            border-radius: 10px;
            color: #FF6666;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="vault-container">
        <div class="vault-header">
            <h1>⚡ THE VAULT</h1>
            <div class="subtitle">CTO • SANDE ALLAN • EYES ONLY</div>
        </div>

        <div class="security-badge">
            <div class="badge-item">
                <div class="badge-icon">🔐</div>
                <div class="badge-text">MILITARY GRADE</div>
            </div>
            <div class="badge-item">
                <div class="badge-icon">🔑</div>
                <div class="badge-text">OTP REQUIRED</div>
            </div>
            <div class="badge-item">
                <div class="badge-icon">📋</div>
                <div class="badge-text">AUDIT LOGGED</div>
            </div>
        </div>

        <div class="alert" id="errorAlert">
            ⚠️ Access Denied. Invalid credentials or OTP.
        </div>

        <form id="vaultForm" onsubmit="return false;">
            <div class="input-group">
                <label>📧 CTO EMAIL</label>
                <input type="email" id="email" value="sande.allan@dreamteamconsult.net" readonly style="opacity:0.8;">
            </div>

            <div class="input-group">
                <label>🔑 MASTER PASSWORD</label>
                <input type="password" id="password" placeholder="Enter master password" autocomplete="off">
            </div>

            <div class="input-group">
                <label>📱 OTP AUTHENTICATION</label>
                <div class="otp-group">
                    <input type="text" maxlength="1" class="otp" onkeyup="moveToNext(this,0)">
                    <input type="text" maxlength="1" class="otp" onkeyup="moveToNext(this,1)">
                    <input type="text" maxlength="1" class="otp" onkeyup="moveToNext(this,2)">
                    <input type="text" maxlength="1" class="otp" onkeyup="moveToNext(this,3)">
                    <input type="text" maxlength="1" class="otp" onkeyup="moveToNext(this,4)">
                    <input type="text" maxlength="1" class="otp" onkeyup="moveToNext(this,5)">
                </div>
            </div>

            <button class="btn-vault" onclick="authenticate()">🔓 UNLOCK THE VAULT</button>
        </form>

        <div class="vault-footer">
            ⚡ All access attempts are logged • Military-grade encryption • Unauthorized access will be prosecuted
        </div>
    </div>

    <script>
        // OTP navigation
        function moveToNext(current, index) {
            if (current.value.length === 1) {
                const next = document.querySelectorAll('.otp')[index + 1];
                if (next) next.focus();
            }
        }

        // Authentication function (CTO ONLY)
        function authenticate() {
            const password = document.getElementById('password').value;
            const otp1 = document.querySelectorAll('.otp')[0].value;
            const otp2 = document.querySelectorAll('.otp')[1].value;
            const otp3 = document.querySelectorAll('.otp')[2].value;
            const otp4 = document.querySelectorAll('.otp')[3].value;
            const otp5 = document.querySelectorAll('.otp')[4].value;
            const otp6 = document.querySelectorAll('.otp')[5].value;
            
            const otp = otp1 + otp2 + otp3 + otp4 + otp5 + otp6;
            
            // CTO credentials (in production, this would be server-side)
            if (password === 'Titanium2026!' && otp === '123456') {
                // Log access
                console.log('✅ VAULT ACCESSED: ' + new Date().toISOString());
                window.location.href = '/vault/dashboard';
            } else {
                document.getElementById('errorAlert').style.display = 'block';
                // Clear OTP fields
                document.querySelectorAll('.otp').forEach(field => field.value = '');
                document.querySelectorAll('.otp')[0].focus();
            }
        }

        // Auto-focus first OTP field
        document.querySelectorAll('.otp')[0].focus();
    </script>
</body>
</html>
